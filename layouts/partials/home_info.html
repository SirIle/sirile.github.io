{{- with site.Params.homeInfoParams }}
<article class="first-entry home-info">
    {{- with site.Params.cover.image }}
    <div class="banner-container" style="position:relative; width:100%; border-radius:8px; overflow:hidden; margin-bottom:1.5em;">
        <img src="/{{ . }}" alt="{{ site.Params.cover.alt }}" style="width:100%; display:block;" />
        <div style="position:absolute; top:0; left:0; width:100%; height:100%; display:flex; flex-direction:column; justify-content:center; padding-left:2em;">
            <span style="font-family:'JetBrains Mono',monospace; font-size:clamp(1.2rem,3vw,2.2rem); color:white; text-shadow:0 2px 8px rgba(0,0,0,0.7);">Musings about technology</span>
            <span style="font-family:'JetBrains Mono',monospace; font-size:clamp(0.65rem,1.3vw,0.95rem); color:rgba(255,255,255,0.75); text-shadow:0 1px 4px rgba(0,0,0,0.7); margin-top:0.3em;">Personal reflections by Ilkka Anttonen</span>
        </div>
    </div>
    {{- end }}
    <div class="entry-content">
        {{ .Content | markdownify }}
    </div>
    <footer class="entry-footer">
        {{ partial "social_icons.html" (dict "align" site.Params.homeInfoParams.AlignSocialIconsTo) }}
    </footer>
</article>
{{- end -}}
