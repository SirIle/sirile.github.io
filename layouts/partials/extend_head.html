<!-- Mermaid diagrams -->
<script type="module">
  import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';

  function getMermaidTheme() {
    const isDark = document.body.classList.contains('dark') ||
      (localStorage.getItem('pref-theme') === 'dark') ||
      (!localStorage.getItem('pref-theme') && window.matchMedia('(prefers-color-scheme: dark)').matches);
    return isDark ? 'dark' : 'default';
  }

  mermaid.initialize({
    startOnLoad: true,
    theme: getMermaidTheme(),
    themeVariables: { primaryColor: '#e08a2e', primaryTextColor: '#fff' }
  });

  // Re-render on theme toggle
  const toggle = document.getElementById('theme-toggle');
  if (toggle) {
    toggle.addEventListener('click', async () => {
      await new Promise(r => setTimeout(r, 50));
      const nodes = document.querySelectorAll('.mermaid');
      nodes.forEach(el => {
        el.removeAttribute('data-processed');
        const svg = el.querySelector('svg');
        if (svg) {
          el.innerHTML = el.getAttribute('data-original') || el.textContent;
        }
      });
      mermaid.initialize({
        startOnLoad: false,
        theme: getMermaidTheme(),
        themeVariables: { primaryColor: '#e08a2e', primaryTextColor: '#fff' }
      });
      await mermaid.run({ nodes });
    });
  }

  // Store original source for re-rendering
  document.querySelectorAll('.mermaid').forEach(el => {
    if (!el.getAttribute('data-original')) {
      el.setAttribute('data-original', el.textContent);
    }
  });
</script>
<!-- GLightbox for image zoom -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/glightbox@3/dist/css/glightbox.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/glightbox@3/dist/js/glightbox.min.js"></script>
<script defer>
  window.addEventListener('load', function() {
    if (typeof GLightbox !== 'undefined') {
      document.querySelectorAll('.post-content img:not(.mermaid img)').forEach(function(img) {
        if (!img.closest('a')) {
          var a = document.createElement('a');
          a.href = img.src;
          a.classList.add('glightbox');
          img.parentNode.insertBefore(a, img);
          a.appendChild(img);
        }
      });
      GLightbox({ selector: '.glightbox' });
    }
  });
</script>
